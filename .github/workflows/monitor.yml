name: University Admission Monitor

on:
  schedule:
    - cron: '0 0 * * *'
    - cron: '0 12 * * *'

  workflow_dispatch:
    inputs:
      dry_run:
        description: '测试模式（不实际发布）'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'
      sync_target:
        description: '同步目标'
        required: false
        default: 'local'
        type: choice
        options:
          - 'all'
          - 'supabase'
          - 'local'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Check environment variables
        run: |
          echo "=== 环境变量检查 ==="
          echo "DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:+已配置}${DEEPSEEK_API_KEY:-(未配置)}"
          echo "SUPABASE_URL: ${SUPABASE_URL:+已配置}${SUPABASE_URL:-(未配置)}"
          echo "SUPABASE_KEY: ${SUPABASE_KEY:+已配置}${SUPABASE_KEY:-(未配置)}"
          echo "BOT_USER_ID: ${BOT_USER_ID:+已配置}${BOT_USER_ID:-(未配置)}"

      - name: Run monitor with export
        working-directory: backend
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BOT_USER_ID: ${{ secrets.BOT_USER_ID }}
        run: |
          echo "=== 开始监控任务 ==="
          echo "时间: $(date -u '+%Y-%m-%d %H:%M:%S UTC')"
          echo "模式: ${{ github.event.inputs.dry_run || 'false' }}"
          echo "同步目标: ${{ github.event.inputs.sync_target || 'local' }}"

          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "⚠️ DEEPSEEK_API_KEY 未配置，跳过监控任务"
            echo '{"liuqingju_exports": 0, "posts_published": 0}' > ../data/liuqingju_sync_meta.json
            exit 0
          fi

          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            echo ">>> 测试模式运行"
            python src/main.py --dry-run --export-liuqingju
          else
            echo ">>> 正式运行"
            python src/main.py --export-liuqingju --sync-target ${{ github.event.inputs.sync_target || 'local' }}
          fi

      - name: Display sync results
        run: |
          echo "=== 同步结果 ==="
          if [ -f "data/liuqingju_export.json" ]; then
            echo "留情局数据文件已生成"
            echo "条数: $(cat data/liuqingju_export.json | python3 -c 'import sys,json; print(len(json.load(sys.stdin)))' 2>/dev/null || echo '0')"
          else
            echo "无新增数据需要同步"
          fi

      - name: Create fallback metadata
        run: |
          if [ ! -f "data/liuqingju_sync_meta.json" ]; then
            echo '{"liuqingju_exports": 0, "posts_published": 0}' > data/liuqingju_sync_meta.json
          fi
          if [ ! -f "data/liuqingju_export.json" ]; then
            echo '[]' > data/liuqingju_export.json
          fi
          if [ ! -f "data/liuqingju_sync.js" ]; then
            echo '// 留情局同步数据' > data/liuqingju_sync.js
          fi

      - name: Upload data package
        uses: actions/upload-artifact@v4
        with:
          name: liuqingju-data-${{ github.run_number }}
          path: |
            data/liuqingju_export.json
            data/liuqingju_sync.js
            data/liuqingju_sync_meta.json
          retention-days: 3

      - name: Create Summary
        if: always()
        run: |
          echo "## 监控任务完成" >> $GITHUB_STEP_SUMMARY
          echo "**执行时间**: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**运行编号**: #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ -f "data/liuqingju_sync_meta.json" ]; then
            echo "### 同步统计" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat data/liuqingju_sync_meta.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

  notify:
    needs: monitor
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download data artifact
        uses: actions/download-artifact@v4
        with:
          name: liuqingju-data-${{ github.run_number }}
          path: data
        continue-on-error: true

      - name: Display notification
        run: |
          echo "## 任务状态: ${{ needs.monitor.result }}" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.monitor.result }}" = "success" ]; then
            echo "✅ 监控任务成功完成" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ 监控任务执行失败，请检查日志" >> $GITHUB_STEP_SUMMARY
          fi
