name: Simple Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'test'
        type: choice
        options:
          - 'test'
          - 'dry-run'
          - 'full'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run main script
        working-directory: backend
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          BOT_USER_ID: ${{ secrets.BOT_USER_ID }}
        run: |
          echo "=== 运行主程序 ==="
          echo "模式: ${{ github.event.inputs.mode }}"
          
          echo "检查环境变量..."
          [ -n "$DEEPSEEK_API_KEY" ] && echo "✓ DEEPSEEK_API_KEY" || echo "✗ DEEPSEEK_API_KEY"
          [ -n "$SUPABASE_URL" ] && echo "✓ SUPABASE_URL" || echo "✗ SUPABASE_URL"
          [ -n "$SUPABASE_KEY" ] && echo "✓ SUPABASE_KEY" || echo "✗ SUPABASE_KEY"
          [ -n "$BOT_USER_ID" ] && echo "✓ BOT_USER_ID" || echo "✗ BOT_USER_ID"
          
          echo "=== 开始执行 ==="
          
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then
            python src/main.py --export-liuqingju --sync-target local
          elif [ "${{ github.event.inputs.mode }}" = "dry-run" ]; then
            python src/main.py --dry-run --export-liuqingju
          else
            python src/main.py --help
          fi

      - name: Ensure data files
        run: |
          [ ! -f "data/liuqingju_export.json" ] && echo '[]' > data/liuqingju_export.json
          [ ! -f "data/liuqingju_sync_meta.json" ] && echo '{"posts_published": 0}' > data/liuqingju_sync_meta.json
          ls -la data/

      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: monitor-data-${{ github.run_number }}
          path: data/
