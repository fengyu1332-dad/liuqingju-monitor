name: Simple Monitor

on:
  workflow_dispatch:
    inputs:
      mode:
        description: '运行模式'
        required: false
        default: 'test'
        type: choice
        options:
          - 'test'
          - 'dry-run'
          - 'full'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        working-directory: backend
        run: |
          echo "=== 安装依赖 ==="
          pip install -r requirements.txt

      - name: Create data directory
        run: mkdir -p data

      - name: Run main script
        working-directory: backend
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          echo "=== 运行主程序 ==="
          echo "模式: ${{ github.event.inputs.mode }}"
          
          if [ -z "$DEEPSEEK_API_KEY" ]; then
            echo "⚠️ DEEPSEEK_API_KEY 未配置"
          else
            echo "✓ DEEPSEEK_API_KEY 已配置"
          fi
          
          echo "=== 开始执行 ==="
          
          if [ "${{ github.event.inputs.mode }}" = "full" ]; then
            echo ">>> 完整模式"
            python src/main.py --export-liuqingju --sync-target local
          elif [ "${{ github.event.inputs.mode }}" = "dry-run" ]; then
            echo ">>> 干运行模式"
            python src/main.py --dry-run --export-liuqingju
          else
            echo ">>> 测试模式"
            python src/main.py --help
          fi
          
          echo "=== 执行完成 ==="

      - name: Ensure data files
        run: |
          echo "=== 确保数据文件存在 ==="
          if [ ! -f "data/liuqingju_export.json" ]; then
            echo '[]' > data/liuqingju_export.json
          fi
          if [ ! -f "data/liuqingju_sync_meta.json" ]; then
            echo '{"posts_published": 0}' > data/liuqingju_sync_meta.json
          fi
          ls -la data/

      - name: Upload data
        uses: actions/upload-artifact@v4
        with:
          name: monitor-data-${{ github.run_number }}
          path: data/
