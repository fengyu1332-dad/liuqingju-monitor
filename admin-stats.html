<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据统计 - 留情局管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .stats-page {
            min-height: 100vh;
            background: #0f0f23;
            color: white;
        }

        .stats-header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 0;
        }

        .stats-header-content {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .stats-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 700;
        }

        .stats-logo i {
            color: var(--accent-color);
        }

        .stats-nav {
            display: flex;
            gap: 8px;
        }

        .stats-nav-item {
            padding: 10px 18px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.3s;
        }

        .stats-nav-item:hover,
        .stats-nav-item.active {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .stats-nav-item.active {
            background: var(--accent-color);
        }

        .stats-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px 20px;
        }

        .stats-time-range {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;
        }

        .time-btn {
            padding: 10px 20px;
            border: 1px solid rgba(255,255,255,0.2);
            background: transparent;
            color: rgba(255,255,255,0.7);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .time-btn:hover {
            border-color: var(--accent-color);
            color: var(--accent-color);
        }

        .time-btn.active {
            background: var(--accent-color);
            border-color: var(--accent-color);
            color: white;
        }

        .overview-stats {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .overview-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            position: relative;
            overflow: hidden;
        }

        .overview-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
        }

        .overview-card.purple::before {
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .overview-card.blue::before {
            background: linear-gradient(90deg, #4facfe, #00f2fe);
        }

        .overview-card.green::before {
            background: linear-gradient(90deg, #11998e, #38ef7d);
        }

        .overview-card.orange::before {
            background: linear-gradient(90deg, #f093fb, #f5576c);
        }

        .overview-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .overview-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
        }

        .overview-card.purple .overview-icon {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .overview-card.blue .overview-icon {
            background: rgba(79, 172, 254, 0.2);
            color: #4facfe;
        }

        .overview-card.green .overview-icon {
            background: rgba(17, 153, 142, 0.2);
            color: #38ef7d;
        }

        .overview-card.orange .overview-icon {
            background: rgba(240, 147, 251, 0.2);
            color: #f093fb;
        }

        .overview-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 20px;
        }

        .overview-trend.up {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .overview-trend.down {
            background: rgba(229, 57, 53, 0.2);
            color: #E53935;
        }

        .overview-value {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .overview-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 30px;
        }

        .stats-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
        }

        .stats-card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }

        .stats-card-title {
            font-size: 18px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .stats-card-title i {
            color: var(--accent-color);
        }

        .chart-actions {
            display: flex;
            gap: 8px;
        }

        .chart-action {
            padding: 6px 12px;
            border: none;
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.7);
            border-radius: 6px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .chart-action:hover {
            background: rgba(255,255,255,0.2);
        }

        .chart-action.active {
            background: var(--accent-color);
            color: white;
        }

        .line-chart {
            height: 300px;
            position: relative;
        }

        .chart-canvas {
            width: 100%;
            height: 100%;
        }

        .hot-searches {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .hot-search-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 14px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .hot-search-item:hover {
            background: rgba(255,255,255,0.1);
        }

        .hot-rank {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }

        .hot-rank.top1 {
            background: linear-gradient(135deg, #FFD700, #FFA500);
            color: white;
        }

        .hot-rank.top2 {
            background: linear-gradient(135deg, #C0C0C0, #A0A0A0);
            color: white;
        }

        .hot-rank.top3 {
            background: linear-gradient(135deg, #CD7F32, #B87333);
            color: white;
        }

        .hot-rank.normal {
            background: rgba(255,255,255,0.1);
            color: rgba(255,255,255,0.6);
        }

        .hot-content {
            flex: 1;
        }

        .hot-keyword {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .hot-meta {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }

        .hot-trend {
            display: flex;
            align-items: center;
            gap: 4px;
            font-size: 13px;
        }

        .hot-trend.up {
            color: #4CAF50;
        }

        .hot-trend.down {
            color: #E53935;
        }

        .hot-trend.stable {
            color: rgba(255,255,255,0.5);
        }

        .content-stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }

        .content-stat-card {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 16px;
            padding: 24px;
            text-align: center;
        }

        .content-stat-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin: 0 auto 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .content-stat-icon.posts {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }

        .content-stat-icon.resources {
            background: rgba(79, 172, 254, 0.2);
            color: #4facfe;
        }

        .content-stat-icon.bounties {
            background: rgba(240, 147, 251, 0.2);
            color: #f093fb;
        }

        .content-stat-value {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .content-stat-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin-bottom: 16px;
        }

        .content-stat-trend {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
        }

        .content-stat-trend.up {
            background: rgba(76, 175, 80, 0.2);
            color: #4CAF50;
        }

        .user-stats-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
        }

        .user-stat-item {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
        }

        .user-stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .user-stat-label {
            font-size: 13px;
            color: rgba(255,255,255,0.6);
        }

        @media (max-width: 1024px) {
            .overview-stats {
                grid-template-columns: repeat(2, 1fr);
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .content-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }

            .user-stats-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 640px) {
            .overview-stats {
                grid-template-columns: 1fr;
            }

            .content-stats-grid {
                grid-template-columns: 1fr;
            }

            .stats-nav {
                display: none;
            }
        }
    </style>
</head>
<body class="stats-page">
    <header class="stats-header">
        <div class="container">
            <div class="stats-header-content">
                <div class="stats-logo">
                    <i class="fas fa-landmark"></i>
                    <span>留情局数据统计</span>
                </div>
                <nav class="stats-nav">
                    <a href="admin-moderation.html" class="stats-nav-item">内容审核</a>
                    <a href="admin-stats.html" class="stats-nav-item active">数据统计</a>
                    <a href="index.html" class="stats-nav-item">返回首页</a>
                </nav>
            </div>
        </div>
    </header>

    <main class="stats-container">
        <div class="stats-time-range">
            <button class="time-btn" data-range="today">今日</button>
            <button class="time-btn active" data-range="week">本周</button>
            <button class="time-btn" data-range="month">本月</button>
            <button class="time-btn" data-range="year">本年</button>
        </div>

        <div class="overview-stats">
            <div class="overview-card purple">
                <div class="overview-card-header">
                    <div class="overview-icon">
                        <i class="fas fa-users"></i>
                    </div>
                    <span class="overview-trend up">
                        <i class="fas fa-arrow-up"></i> 12.5%
                    </span>
                </div>
                <div class="overview-value">8,640</div>
                <div class="overview-label">活跃用户</div>
            </div>
            <div class="overview-card blue">
                <div class="overview-card-header">
                    <div class="overview-icon">
                        <i class="fas fa-file-alt"></i>
                    </div>
                    <span class="overview-trend up">
                        <i class="fas fa-arrow-up"></i> 8.2%
                    </span>
                </div>
                <div class="overview-value">3,210</div>
                <div class="overview-label">内容发布</div>
            </div>
            <div class="overview-card green">
                <div class="overview-card-header">
                    <div class="overview-icon">
                        <i class="fas fa-eye"></i>
                    </div>
                    <span class="overview-trend up">
                        <i class="fas fa-arrow-up"></i> 23.1%
                    </span>
                </div>
                <div class="overview-value">156K</div>
                <div class="overview-label">总浏览量</div>
            </div>
            <div class="overview-card orange">
                <div class="overview-card-header">
                    <div class="overview-icon">
                        <i class="fas fa-comments"></i>
                    </div>
                    <span class="overview-trend down">
                        <i class="fas fa-arrow-down"></i> 3.2%
                    </span>
                </div>
                <div class="overview-value">12.8K</div>
                <div class="overview-label">互动次数</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="stats-card">
                <div class="stats-card-header">
                    <h2 class="stats-card-title">
                        <i class="fas fa-chart-line"></i>
                        趋势分析
                    </h2>
                    <div class="chart-actions">
                        <button class="chart-action active">用户活跃</button>
                        <button class="chart-action">内容发布</button>
                        <button class="chart-action">互动量</button>
                    </div>
                </div>
                <div class="line-chart">
                    <canvas id="trendChart" class="chart-canvas"></canvas>
                </div>
            </div>

            <div class="stats-card">
                <div class="stats-card-header">
                    <h2 class="stats-card-title">
                        <i class="fas fa-fire"></i>
                        热搜排行
                    </h2>
                </div>
                <div class="hot-searches" id="hot-searches">
                </div>
            </div>
        </div>

        <div class="content-stats-grid">
            <div class="content-stat-card">
                <div class="content-stat-icon posts">
                    <i class="fas fa-comment"></i>
                </div>
                <div class="content-stat-value">1,856</div>
                <div class="content-stat-label">论坛帖子</div>
                <span class="content-stat-trend up">
                    <i class="fas fa-arrow-up"></i> 本周 +126
                </span>
            </div>
            <div class="content-stat-card">
                <div class="content-stat-icon resources">
                    <i class="fas fa-gift"></i>
                </div>
                <div class="content-stat-value">486</div>
                <div class="content-stat-label">共享资源</div>
                <span class="content-stat-trend up">
                    <i class="fas fa-arrow-up"></i> 本周 +34
                </span>
            </div>
            <div class="content-stat-card">
                <div class="content-stat-icon bounties">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="content-stat-value">128</div>
                <div class="content-stat-label">悬赏任务</div>
                <span class="content-stat-trend up">
                    <i class="fas fa-arrow-up"></i> 本周 +12
                </span>
            </div>
        </div>

        <div class="stats-card">
            <div class="stats-card-header">
                <h2 class="stats-card-title">
                    <i class="fas fa-user-chart"></i>
                    用户统计
                </h2>
            </div>
            <div class="user-stats-grid">
                <div class="user-stat-item">
                    <div class="user-stat-value">8,640</div>
                    <div class="user-stat-label">总用户数</div>
                </div>
                <div class="user-stat-item">
                    <div class="user-stat-value">2,156</div>
                    <div class="user-stat-label">日活用户</div>
                </div>
                <div class="user-stat-item">
                    <div class="user-stat-value">486</div>
                    <div class="user-stat-label">周活用户</div>
                </div>
                <div class="user-stat-item">
                    <div class="user-stat-value">68</div>
                    <div class="user-stat-label">认证用户</div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const hotSearches = [
            { rank: 1, keyword: 'IB课程', count: 1234, trend: 'up', change: '+15%' },
            { rank: 2, keyword: 'AP考试', count: 1156, trend: 'up', change: '+12%' },
            { rank: 3, keyword: 'SAT备考', count: 987, trend: 'stable', change: '0%' },
            { rank: 4, keyword: '留学申请', count: 876, trend: 'down', change: '-5%' },
            { rank: 5, keyword: '申请文书', count: 765, trend: 'up', change: '+8%' },
            { rank: 6, keyword: '托福备考', count: 654, trend: 'stable', change: '0%' }
        ];

        function renderHotSearches() {
            const container = document.getElementById('hot-searches');

            container.innerHTML = hotSearches.map(item => {
                const rankClass = item.rank <= 3 ? `top${item.rank}` : 'normal';
                const trendIcon = item.trend === 'up' ? 'fa-arrow-up' : item.trend === 'down' ? 'fa-arrow-down' : 'fa-minus';

                return `
                    <div class="hot-search-item">
                        <div class="hot-rank ${rankClass}">${item.rank}</div>
                        <div class="hot-content">
                            <div class="hot-keyword">${item.keyword}</div>
                            <div class="hot-meta">${item.count} 次搜索</div>
                        </div>
                        <div class="hot-trend ${item.trend}">
                            <i class="fas ${trendIcon}"></i>
                            ${item.change}
                        </div>
                    </div>
                `;
            }).join('');
        }

        function drawChart() {
            const canvas = document.getElementById('trendChart');
            const ctx = canvas.getContext('2d');

            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;

            const data = [65, 78, 72, 85, 82, 90, 95, 88, 92, 98, 105, 112];
            const labels = ['1月', '2月', '3月', '4月', '5月', '6月', '7月', '8月', '9月', '10月', '11月', '12月'];

            const maxValue = Math.max(...data);
            const padding = 40;
            const chartWidth = canvas.width - padding * 2;
            const chartHeight = canvas.height - padding * 2;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            const gradient = ctx.createLinearGradient(0, 0, 0, canvas.height);
            gradient.addColorStop(0, 'rgba(102, 126, 234, 0.3)');
            gradient.addColorStop(1, 'rgba(102, 126, 234, 0)');

            ctx.beginPath();
            data.forEach((value, index) => {
                const x = padding + (index / (data.length - 1)) * chartWidth;
                const y = padding + chartHeight - (value / maxValue) * chartHeight;
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.lineTo(padding + chartWidth, padding + chartHeight);
            ctx.lineTo(padding, padding + chartHeight);
            ctx.closePath();
            ctx.fillStyle = gradient;
            ctx.fill();

            ctx.beginPath();
            data.forEach((value, index) => {
                const x = padding + (index / (data.length - 1)) * chartWidth;
                const y = padding + chartHeight - (value / maxValue) * chartHeight;
                if (index === 0) {
                    ctx.moveTo(x, y);
                } else {
                    ctx.lineTo(x, y);
                }
            });

            ctx.strokeStyle = '#667eea';
            ctx.lineWidth = 3;
            ctx.stroke();

            data.forEach((value, index) => {
                const x = padding + (index / (data.length - 1)) * chartWidth;
                const y = padding + chartHeight - (value / maxValue) * chartHeight;

                ctx.beginPath();
                ctx.arc(x, y, 5, 0, Math.PI * 2);
                ctx.fillStyle = '#667eea';
                ctx.fill();
                ctx.strokeStyle = 'white';
                ctx.lineWidth = 2;
                ctx.stroke();
            });

            ctx.fillStyle = 'rgba(255,255,255,0.6)';
            ctx.font = '12px Arial';
            ctx.textAlign = 'center';

            labels.forEach((label, index) => {
                const x = padding + (index / (labels.length - 1)) * chartWidth;
                ctx.fillText(label, x, canvas.height - 10);
            });
        }

        document.querySelectorAll('.time-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.time-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        document.querySelectorAll('.chart-action').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.chart-action').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
            });
        });

        window.addEventListener('resize', () => {
            drawChart();
        });

        document.addEventListener('DOMContentLoaded', () => {
            renderHotSearches();
            drawChart();
        });
    </script>
</body>
</html>
