<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 留情局</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-body {
            background: var(--bg-light);
        }

        .admin-layout {
            display: flex;
            min-height: 100vh;
        }

        .admin-sidebar {
            width: 260px;
            background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%);
            color: white;
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .admin-logo {
            padding: 24px 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .admin-logo i {
            font-size: 28px;
            color: #e6b86a;
        }

        .admin-logo span {
            font-size: 20px;
            font-weight: 700;
            color: white;
        }

        .admin-nav {
            flex: 1;
            padding: 20px 0;
        }

        .admin-nav ul {
            list-style: none;
        }

        .admin-nav li {
            margin-bottom: 4px;
        }

        .admin-nav a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 14px 20px;
            color: rgba(255,255,255,0.7);
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .admin-nav a:hover {
            background: rgba(255,255,255,0.1);
            color: white;
        }

        .admin-nav li.active a {
            background: rgba(230, 184, 106, 0.2);
            color: #e6b86a;
            border-left: 3px solid #e6b86a;
        }

        .admin-nav a i {
            width: 20px;
            text-align: center;
        }

        .admin-footer {
            padding: 20px;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        .admin-user {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 16px;
        }

        .admin-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-info {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            font-size: 14px;
        }

        .user-role {
            font-size: 12px;
            color: #e6b86a;
        }

        .new-report-btn {
            width: 100%;
            padding: 10px;
            background: rgba(230, 184, 106, 0.2);
            border: 1px solid rgba(230, 184, 106, 0.4);
            color: #e6b86a;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .new-report-btn:hover {
            background: rgba(230, 184, 106, 0.3);
        }

        .admin-main {
            flex: 1;
            margin-left: 260px;
            display: flex;
            flex-direction: column;
        }

        .admin-header {
            background: white;
            padding: 20px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .admin-header h1 {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .admin-header > p {
            color: var(--text-secondary);
            font-size: 14px;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .admin-search {
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            width: 240px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .admin-search:focus {
            border-color: #e6b86a;
        }

        .notification-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--border-color);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .notification-btn:hover {
            background: var(--bg-light);
        }

        .notification-btn i {
            color: var(--text-secondary);
        }

        .admin-content {
            flex: 1;
            padding: 32px;
        }

        .admin-tab-content {
            display: none;
        }

        .admin-tab-content.active {
            display: block;
        }

        .stats-row {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .card-header h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .time-filter {
            font-size: 12px;
            color: var(--text-secondary);
            background: var(--bg-light);
            padding: 4px 12px;
            border-radius: 20px;
        }

        .card-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 20px;
        }

        .chart-placeholder {
            height: 200px;
            display: flex;
            align-items: flex-end;
            padding: 20px 0;
        }

        .bar-chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            width: 100%;
            height: 100%;
            gap: 8px;
        }

        .bar {
            flex: 1;
            background: linear-gradient(180deg, #e6b86a 0%, #d4a55a 100%);
            border-radius: 4px 4px 0 0;
            transition: all 0.3s ease;
        }

        .bar:hover {
            background: linear-gradient(180deg, #f0c87a 0%, #e6b86a 100%);
        }

        .bar.highlight {
            background: linear-gradient(180deg, #c9956a 0%, #b8845a 100%);
        }

        .stats-cards {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            display: flex;
            align-items: center;
            gap: 16px;
            box-shadow: var(--shadow-sm);
        }

        .stat-card.gold {
            background: linear-gradient(135deg, #f8e8c8 0%, #f0d8b0 100%);
        }

        .stat-icon {
            width: 48px;
            height: 48px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: white;
        }

        .stat-card.gold .stat-icon {
            background: rgba(139, 69, 19, 0.1);
        }

        .stat-icon i {
            font-size: 24px;
            color: #8b4513;
        }

        .stat-card.gold .stat-icon i {
            color: #e6b86a;
        }

        .stat-info {
            display: flex;
            flex-direction: column;
        }

        .stat-label {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 20px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-change {
            font-size: 12px;
            color: #52c41a;
            margin-top: 4px;
        }

        .stat-sub {
            font-size: 12px;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .content-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            margin-bottom: 24px;
        }

        .ai-assistant-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .ai-icon {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }

        .ai-icon i {
            color: white;
            font-size: 18px;
        }

        .ai-badge {
            font-size: 11px;
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
            padding: 4px 10px;
            border-radius: 20px;
            margin-left: auto;
        }

        .ai-content {
            margin: 16px 0;
            padding: 16px;
            background: var(--bg-light);
            border-radius: 8px;
        }

        .ai-content p {
            font-size: 14px;
            line-height: 1.6;
            color: var(--text-primary);
        }

        .ai-actions {
            display: flex;
            gap: 12px;
        }

        .ai-btn {
            padding: 8px 20px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-primary);
        }

        .ai-btn.primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
        }

        .ai-btn:hover {
            opacity: 0.9;
        }

        .disputes-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .view-all {
            font-size: 13px;
            color: var(--primary-color);
            text-decoration: none;
        }

        .dispute-list {
            margin-top: 16px;
        }

        .dispute-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            border-radius: 8px;
            transition: background 0.3s ease;
            margin-bottom: 8px;
        }

        .dispute-item:hover {
            background: var(--bg-light);
        }

        .dispute-id {
            font-size: 12px;
            color: var(--text-secondary);
            font-family: monospace;
        }

        .dispute-title {
            flex: 1;
            font-size: 14px;
            color: var(--text-primary);
        }

        .dispute-info {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .priority-tag {
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(82, 196, 26, 0.1);
            color: #52c41a;
        }

        .priority-tag.high {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
        }

        .dispute-action {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: none;
            background: var(--bg-light);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .dispute-action:hover {
            background: var(--primary-color);
        }

        .dispute-action i {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .dispute-action:hover i {
            color: white;
        }

        .monitor-section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
        }

        .monitor-section h3 {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 20px;
        }

        .monitor-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
        }

        .monitor-card {
            border-radius: 8px;
            overflow: hidden;
            aspect-ratio: 4/3;
        }

        .monitor-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s ease;
        }

        .monitor-card:hover img {
            transform: scale(1.05);
        }

        .admin-footer-bar {
            padding: 20px 32px;
            background: white;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .admin-footer-bar p {
            font-size: 13px;
            color: var(--text-secondary);
        }

        .footer-links {
            display: flex;
            gap: 24px;
        }

        .footer-links a {
            font-size: 13px;
            color: var(--text-secondary);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .footer-links a:hover {
            color: var(--primary-color);
        }

        .admin-panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-sm);
            margin-bottom: 24px;
        }

        .admin-panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .admin-panel-header h2 {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
        }

        .admin-table {
            width: 100%;
            border-collapse: collapse;
        }

        .admin-table th,
        .admin-table td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }

        .admin-table th {
            background: var(--bg-light);
            font-weight: 600;
            font-size: 13px;
            color: var(--text-primary);
        }

        .admin-table th:first-child {
            border-radius: 8px 0 0 8px;
        }

        .admin-table th:last-child {
            border-radius: 0 8px 8px 0;
        }

        .admin-table tr:hover td {
            background: rgba(230, 184, 106, 0.05);
        }

        .admin-table td {
            font-size: 14px;
            color: var(--text-primary);
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-badge.active {
            background: rgba(82, 196, 26, 0.1);
            color: #52c41a;
        }

        .status-badge.closed {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
        }

        .status-badge.pending {
            background: rgba(250, 173, 20, 0.1);
            color: #faad14;
        }

        .status-badge.featured {
            background: rgba(230, 184, 106, 0.2);
            color: #8b4513;
        }

        .status-badge.disabled {
            background: rgba(0, 0, 0, 0.05);
            color: var(--text-secondary);
        }

        .admin-action-btn {
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: none;
            margin-right: 8px;
        }

        .admin-action-btn.danger {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
        }

        .admin-action-btn.danger:hover {
            background: #ff4d4f;
            color: white;
        }

        .admin-action-btn.warning {
            background: rgba(250, 173, 20, 0.1);
            color: #faad14;
        }

        .admin-action-btn.warning:hover {
            background: #faad14;
            color: white;
        }

        .admin-action-btn.success {
            background: rgba(82, 196, 26, 0.1);
            color: #52c41a;
        }

        .admin-action-btn.success:hover {
            background: #52c41a;
            color: white;
        }

        .admin-action-btn.primary {
            background: rgba(230, 184, 106, 0.2);
            color: #8b4513;
        }

        .admin-action-btn.primary:hover {
            background: #e6b86a;
            color: white;
        }

        .admin-stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: var(--shadow-sm);
        }

        .admin-stat-card .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .admin-stat-card .stat-icon.blue {
            background: rgba(24, 144, 255, 0.1);
        }

        .admin-stat-card .stat-icon.blue i {
            color: #1890ff;
        }

        .admin-stat-card .stat-icon.green {
            background: rgba(82, 196, 26, 0.1);
        }

        .admin-stat-card .stat-icon.green i {
            color: #52c41a;
        }

        .admin-stat-card .stat-icon.orange {
            background: rgba(250, 173, 20, 0.1);
        }

        .admin-stat-card .stat-icon.orange i {
            color: #faad14;
        }

        .admin-stat-card .stat-icon.purple {
            background: rgba(114, 46, 209, 0.1);
        }

        .admin-stat-card .stat-icon.purple i {
            color: #722ed1;
        }

        .admin-stat-card .stat-value {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 4px;
        }

        .admin-stat-card .stat-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .avatar-cell {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar-cell img {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            object-fit: cover;
        }

        .title-cell {
            max-width: 300px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .table-actions {
            white-space: nowrap;
        }

        .search-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .search-bar input {
            flex: 1;
            padding: 10px 16px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 14px;
            outline: none;
        }

        .search-bar input:focus {
            border-color: #e6b86a;
        }

        .refresh-btn {
            padding: 10px 20px;
            background: white;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .refresh-btn:hover {
            background: var(--bg-light);
        }

        .access-denied {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            padding: 40px;
        }

        .access-denied i {
            font-size: 80px;
            color: #ff4d4f;
            margin-bottom: 24px;
        }

        .access-denied h2 {
            font-size: 28px;
            color: var(--text-primary);
            margin-bottom: 12px;
        }

        .access-denied p {
            font-size: 16px;
            color: var(--text-secondary);
            margin-bottom: 24px;
        }

        .access-denied .back-btn {
            padding: 12px 32px;
            background: var(--primary-color);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .access-denied .back-btn:hover {
            opacity: 0.9;
        }

        .loading-spinner {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            color: var(--text-secondary);
        }

        .loading-spinner i {
            margin-right: 8px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-secondary);
        }

        .empty-state i {
            font-size: 48px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state p {
            font-size: 14px;
        }

        .filter-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .filter-tab {
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.3s ease;
            border: 1px solid var(--border-color);
            background: white;
            color: var(--text-secondary);
        }

        .filter-tab:hover {
            background: var(--bg-light);
        }

        .filter-tab.active {
            background: linear-gradient(135deg, #e6b86a 0%, #d4a55a 100%);
            color: white;
            border-color: transparent;
        }

        .filter-tab .count {
            display: inline-block;
            background: rgba(0,0,0,0.1);
            padding: 2px 6px;
            border-radius: 10px;
            font-size: 11px;
            margin-left: 6px;
        }

        .filter-tab.active .count {
            background: rgba(255,255,255,0.3);
        }

        .review-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            transition: all 0.3s ease;
        }

        .review-card:hover {
            box-shadow: var(--shadow-md);
        }

        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 16px;
        }

        .review-info {
            flex: 1;
        }

        .review-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .review-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .review-meta span {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .review-badge {
            display: inline-flex;
            align-items: center;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            margin-right: 8px;
        }

        .review-badge.pending {
            background: rgba(250, 173, 20, 0.1);
            color: #faad14;
        }

        .review-badge.modify {
            background: rgba(102, 126, 234, 0.1);
            color: #667eea;
        }

        .review-badge.approved {
            background: rgba(82, 196, 26, 0.1);
            color: #52c41a;
        }

        .review-badge.rejected {
            background: rgba(255, 77, 79, 0.1);
            color: #ff4d4f;
        }

        .review-content {
            background: var(--bg-light);
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 16px;
        }

        .review-content p {
            font-size: 14px;
            color: var(--text-primary);
            line-height: 1.6;
        }

        .review-file-info {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            background: rgba(230, 184, 106, 0.1);
            border-radius: 8px;
            margin-bottom: 12px;
        }

    <script>
        const AdminApp = {
            currentTab: 'dashboard',

            init() {
                if (!AuthService.isLoggedIn()) {
                    window.location.href = 'index.html';
                    return;
                }

                if (!AdminService.isAdmin()) {
                    document.getElementById('adminApp').style.display = 'none';
                    document.getElementById('accessDenied').style.display = 'flex';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 2000);
                    return;
                }

                document.getElementById('adminApp').style.display = 'flex';
                this.updateAdminUser();
                this.bindEvents();
                this.renderDashboard();
            },

            updateAdminUser() {
                const user = AuthService.getCurrentUser();
                if (user) {
                    document.getElementById('adminAvatar').src = user.avatar || '';
                    document.getElementById('adminName').textContent = user.nickname || user.email;
                }
            },

            bindEvents() {
                const navItems = document.querySelectorAll('.admin-nav li');
                navItems.forEach(item => {
                    item.addEventListener('click', (e) => {
                        e.preventDefault();
                        const tab = item.dataset.tab;
                        this.switchTab(tab);
                    });
                });
            },

            switchTab(tab) {
                this.currentTab = tab;

                document.querySelectorAll('.admin-nav li').forEach(li => {
                    li.classList.toggle('active', li.dataset.tab === tab);
                });

                document.querySelectorAll('.admin-tab-content').forEach(content => {
                    content.classList.remove('active');
                });
                document.getElementById(`tab-${tab}`).classList.add('active');

                const titles = {
                    dashboard: '数据总览',
                    posts: '论坛管理',
                    resources: '资源库管理',
                    bounties: '悬赏任务',
                    reviews: '资源审核',
                    reports: '举报管理',
                    users: '用户分析',
                    monitor: 'AI监控'
                };
                document.getElementById('pageTitle').textContent = titles[tab] || '数据总览';

                switch(tab) {
                    case 'dashboard':
                        this.renderDashboard();
                        break;
                    case 'posts':
                        this.renderPosts();
                        break;
                    case 'resources':
                        this.renderResources();
                        break;
                    case 'bounties':
                        this.renderBounties();
                        break;
                    case 'reviews':
                        this.renderReviews();
                        break;
                    case 'reports':
                        this.renderReports();
                        break;
                    case 'users':
                        this.renderUsers();
                        break;
                    case 'monitor':
                        this.renderMonitor();
                        break;
                }
            },

            renderDashboard() {
                const container = document.getElementById('tab-dashboard');
                const stats = AdminService.getStats();
                const detailedStats = StatsService.getDetailedStats();
                const chartData = StatsService.getChartData('users', 30);
                const realtimeStats = StatsService.getRealtimeStats();

                StatsService.updateDailyStats();

                const maxValue = Math.max(...chartData.datasets[0].data, 1);
                const barsHtml = chartData.labels.map((label, index) => {
                    const height1 = (chartData.datasets[0].data[index] / maxValue * 100) || 5;
                    const height2 = (chartData.datasets[1].data[index] / maxValue * 100) || 5;
                    const isHighlight = index === chartData.labels.length - 1;
                    return `
                        <div class="chart-bar-group" title="${label}: 新增${chartData.datasets[0].data[index]}人, 活跃${chartData.datasets[1].data[index]}人">
                            <div class="chart-bar secondary" style="height: ${height2}%"></div>
                            <div class="chart-bar primary ${isHighlight ? 'highlight' : ''}" style="height: ${height1}%"></div>
                        </div>
                    `;
                }).join('');

                const topContributorsHtml = detailedStats.engagement.topContributors.slice(0, 5).map((user, index) => `
                    <div class="contributor-item">
                        <span class="contributor-rank">${index + 1}</span>
                        <img src="${user.avatar || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + user.id}" alt="${user.nickname}" class="contributor-avatar">
                        <div class="contributor-info">
                            <span class="contributor-name">${user.nickname}</span>
                            <span class="contributor-score">贡献值 ${user.contribution}</span>
                        </div>
                    </div>
                `).join('');

                const topResourcesHtml = detailedStats.content.topResources.slice(0, 5).map((resource, index) => `
                    <div class="top-item">
                        <span class="top-rank">${index + 1}</span>
                        <div class="top-info">
                            <span class="top-title">${resource.title}</span>
                            <span class="top-meta">${resource.author} · ${resource.downloads}次下载</span>
                        </div>
                    </div>
                `).join('');

                container.innerHTML = `
                    <div class="admin-stat-cards">
                        <div class="admin-stat-card">
                            <div class="stat-icon blue">
                                <i class="fas fa-users"></i>
                            </div>
                            <div class="stat-value">${stats.userCount}</div>
                            <div class="stat-label">注册用户</div>
                            <div class="stat-change">+${detailedStats.growth.today.newUsers} 今日新增</div>
                        </div>
                        <div class="admin-stat-card">
                            <div class="stat-icon green">
                                <i class="fas fa-comments"></i>
                            </div>
                            <div class="stat-value">${stats.postCount}</div>
                            <div class="stat-label">论坛帖子</div>
                            <div class="stat-change">+${detailedStats.growth.today.newPosts} 今日新增</div>
                        </div>
                        <div class="admin-stat-card">
                            <div class="stat-icon orange">
                                <i class="fas fa-book"></i>
                            </div>
                            <div class="stat-value">${stats.resourceCount}</div>
                            <div class="stat-label">资源数量</div>
                            <div class="stat-change">+${detailedStats.growth.today.newResources} 今日新增</div>
                        </div>
                        <div class="admin-stat-card">
                            <div class="stat-icon purple">
                                <i class="fas fa-coins"></i>
                            </div>
                            <div class="stat-value">${stats.bountyCount}</div>
                            <div class="stat-label">悬赏任务</div>
                        </div>
                        <div class="admin-stat-card">
                            <div class="stat-icon red">
                                <i class="fas fa-exclamation-triangle"></i>
                            </div>
                            <div class="stat-value">${stats.pendingReports || 0}</div>
                            <div class="stat-label">待处理举报</div>
                        </div>
                        <div class="admin-stat-card">
                            <div class="stat-icon cyan">

            exportStats(format) {

                const a = document.createElement('a');
                a.href = url;
                a.download = `liuqingju_stats_${new Date().toISOString().split('T')[0]}.${format}`;

            renderTrendChart(dailyTrend) {
                const maxCount = Math.max(...dailyTrend.map(d => d.count), 1);
                return dailyTrend.map(day => {
                    const height = Math.max((day.count / maxCount * 100), 5);
                    const date = new Date(day.date);
                    const label = (date.getMonth() + 1) + '/' + date.getDate();
                    return `
                        <div class="chart-bar-wrapper">
                            <div class="chart-bar-container">
                                <div class="chart-bar" style="height: ${height}%"></div>
                            </div>
                            <span class="chart-label">${label}</span>
                        </div>
                    `;
                }).join('');
            },

            async triggerMonitorSync() {
                if (!confirm('确定要立即触发同步吗？')) return;

                const btn = event.target.closest('button');
                const originalText = btn.innerHTML;
                btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 同步中...';
                btn.disabled = true;

                try {
                    const result = await MonitorSvc.triggerSync();

                    if (result.success) {
                        showNotification('同步成功！', 'success');
                        AdminApp.renderMonitor();
                    } else {
                        showNotification('同步失败: ' + result.error, 'error');
                    }
                } catch (error) {
                    showNotification('同步失败: ' + error.message, 'error');
                } finally {
                    btn.innerHTML = originalText;
                    btn.disabled = false;
                }
            },

            formatFileSize(bytes) {
                if (!bytes) return '未知';
                const sizes = ['B', 'KB', 'MB', 'GB'];
                const i = Math.floor(Math.log(bytes) / Math.log(1024));
                return (bytes / Math.pow(1024, i)).toFixed(2) + ' ' + sizes[i];
            },

            getFileIcon(fileType) {
                const iconMap = {
                    pdf: 'pdf',
                    doc: 'word',
                    docx: 'word',
                    xls: 'excel',
                    xlsx: 'excel',
                    ppt: 'powerpoint',
                    pptx: 'powerpoint',
                    zip: 'archive',
                    rar: 'archive',
                    '7z': 'archive',
                    mp4: 'video',
                    avi: 'video',
                    mp3: 'audio',
                    wav: 'audio',
                    jpg: 'image',
                    jpeg: 'image',
                    png: 'image',
                    gif: 'image'
                };
                return iconMap[fileType] || 'alt';
            }
        };

        function formatTimeAgo(dateString) {
            if (!dateString) return '未知';
            const date = new Date(dateString);
            const now = new Date();
            const diff = now - date;
            const minutes = Math.floor(diff / (1000 * 60));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));

            if (minutes < 1) return '刚刚';
            if (minutes < 60) return `${minutes} 分钟前`;
            if (hours < 24) return `${hours} 小时前`;
            if (days < 7) return `${days} 天前`;
            return date.toLocaleDateString('zh-CN');
        }

        function formatNextRun(dateString) {
            if (!dateString) return '未设置';
            const date = new Date(dateString);
            const now = new Date();
            const diff = date - now;

            if (diff < 0) return '已过期';

            const hours = Math.floor(diff / (1000 * 60 * 60));
            const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));

            if (hours > 0) {
                return `${hours}小时${minutes}分钟后`;
            }
            return `${minutes}分钟后`;
        }

        function getCountryFlag(country) {
            const flags = {
                'USA': '🇺🇸',
                'UK': '🇬🇧',
                'China': '🇨🇳',
                'Japan': '🇯🇵',
                'Singapore': '🇸🇬',
                'Switzerland': '🇨🇭',
                'Canada': '🇨🇦',
                'Australia': '🇦🇺',
                'Germany': '🇩🇪',
                'France': '🇫🇷'
            };
            return flags[country] || '🌍';
        }

        function showNotification(message, type = 'info') {
            const notification = document.createElement('div');
            notification.className = `notification notification-${type}`;
            notification.innerHTML = `
                <i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                <span>${message}</span>
            `;

            document.body.appendChild(notification);

            setTimeout(() => {
                notification.classList.add('show');
            }, 10);

            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => {
                    document.body.removeChild(notification);
                }, 300);
            }, 3000);
        }

        window.AdminApp = AdminApp;

        document.addEventListener('DOMContentLoaded', function() {
            AdminApp.init();
        });
    </script>
</body>
</html>
