<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>积分中心 - 留情局</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .points-center {
            min-height: 100vh;
            background: var(--bg-light);
        }

        .points-header {
            background: linear-gradient(135deg, var(--primary-color), var(--primary-dark));
            color: white;
            padding: 60px 0;
            position: relative;
            overflow: hidden;
        }

        .points-header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50%;
        }

        .points-header .container {
            position: relative;
            z-index: 1;
        }

        .points-balance-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 30px;
            box-shadow: var(--shadow-lg);
            margin-top: -30px;
        }

        .balance-item {
            text-align: center;
            padding: 20px;
        }

        .balance-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            font-size: 24px;
        }

        .balance-icon.tokens {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: white;
        }

        .balance-icon.contribution {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .balance-icon.level {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
        }

        .balance-value {
            font-size: 36px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .balance-label {
            font-size: 14px;
            color: var(--text-secondary);
        }

        .balance-progress {
            width: 100%;
            height: 6px;
            background: var(--bg-light);
            border-radius: 3px;
            margin-top: 10px;
            overflow: hidden;
        }

        .balance-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary-color), var(--accent-color));
            border-radius: 3px;
            transition: width 0.3s;
        }

        .balance-hint {
            font-size: 12px;
            color: var(--text-light);
            margin-top: 8px;
        }

        .points-content {
            padding: 40px 0;
        }

        .section-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title i {
            color: var(--primary-color);
        }

        .tasks-section {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
        }

        .task-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 25px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 15px;
        }

        .task-tab {
            padding: 12px 24px;
            background: transparent;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
        }

        .task-tab:hover {
            color: var(--primary-color);
            background: var(--secondary-color);
        }

        .task-tab.active {
            color: var(--primary-color);
            background: var(--secondary-color);
        }

        .task-tab.active::after {
            content: '';
            position: absolute;
            bottom: -17px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--primary-color);
            border-radius: 2px;
        }

        .task-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .task-item {
            display: flex;
            align-items: center;
            gap: 20px;
            padding: 20px;
            background: var(--bg-light);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .task-item:hover {
            transform: translateX(5px);
            box-shadow: var(--shadow-sm);
        }

        .task-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }

        .task-icon.login { background: #E3F2FD; color: #1976D2; }
        .task-icon.post { background: #E8F5E9; color: #388E3C; }
        .task-icon.reply { background: #FFF3E0; color: #F57C00; }
        .task-icon.share { background: #F3E5F5; color: #7B1FA2; }
        .task-icon.invite { background: #E0F7FA; color: #00838F; }
        .task-icon.resource { background: #FBE9E7; color: #D84315; }

        .task-info {
            flex: 1;
        }

        .task-name {
            font-size: 16px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }

        .task-desc {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }

        .task-progress {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .task-progress-bar {
            flex: 1;
            height: 6px;
            background: var(--border-color);
            border-radius: 3px;
            overflow: hidden;
        }

        .task-progress-fill {
            height: 100%;
            background: var(--primary-color);
            border-radius: 3px;
            transition: width 0.3s;
        }

        .task-progress-text {
            font-size: 12px;
            color: var(--text-secondary);
            min-width: 50px;
        }

        .task-reward {
            text-align: center;
            padding: 15px;
            background: var(--secondary-color);
            border-radius: 10px;
            min-width: 80px;
        }

        .task-reward-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .task-reward-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .task-action {
            min-width: 100px;
        }

        .task-btn {
            width: 100%;
            padding: 12px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .task-btn.do {
            background: var(--primary-color);
            color: white;
        }

        .task-btn.do:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }

        .task-btn.done {
            background: var(--bg-light);
            color: var(--text-secondary);
            cursor: not-allowed;
        }

        .task-btn.claimed {
            background: #E8F5E9;
            color: #388E3C;
            cursor: not-allowed;
        }

        .ranking-section {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
        }

        .ranking-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .ranking-tab {
            padding: 10px 20px;
            background: var(--bg-light);
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
        }

        .ranking-tab.active {
            background: var(--primary-color);
            color: white;
        }

        .ranking-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .ranking-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: var(--bg-light);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .ranking-item:hover {
            transform: translateX(5px);
            background: var(--secondary-color);
        }

        .ranking-item.top-3 {
            background: linear-gradient(135deg, var(--secondary-color), #fff);
            border: 2px solid var(--primary-color);
        }

        .ranking-position {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            font-weight: 700;
            flex-shrink: 0;
        }

        .ranking-position.p1 {
            background: linear-gradient(135deg, #ffd700, #ffb347);
            color: white;
        }

        .ranking-position.p2 {
            background: linear-gradient(135deg, #c0c0c0, #a0a0a0);
            color: white;
        }

        .ranking-position.p3 {
            background: linear-gradient(135deg, #cd7f32, #b8860b);
            color: white;
        }

        .ranking-avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            object-fit: cover;
        }

        .ranking-info {
            flex: 1;
        }

        .ranking-name {
            font-size: 15px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .ranking-level {
            font-size: 12px;
            color: var(--primary-color);
        }

        .ranking-score {
            text-align: right;
        }

        .ranking-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--primary-color);
        }

        .ranking-label {
            font-size: 11px;
            color: var(--text-secondary);
        }

        .history-section {
            background: var(--bg-white);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: var(--shadow-sm);
        }

        .history-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .history-item {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 15px 20px;
            background: var(--bg-light);
            border-radius: 10px;
        }

        .history-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }

        .history-icon.income {
            background: #E8F5E9;
            color: #388E3C;
        }

        .history-icon.expense {
            background: #FFEBEE;
            color: #E53935;
        }

        .history-info {
            flex: 1;
        }

        .history-desc {
            font-size: 14px;
            color: var(--text-primary);
            margin-bottom: 3px;
        }

        .history-time {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .history-amount {
            font-size: 16px;
            font-weight: 700;
        }

        .history-amount.income {
            color: #388E3C;
        }

        .history-amount.expense {
            color: #E53935;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
        }

        @media (max-width: 768px) {
            .points-balance-card {
                grid-template-columns: 1fr;
            }

            .grid-2 {
                grid-template-columns: 1fr;
            }

            .task-item {
                flex-direction: column;
                align-items: stretch;
            }

            .task-reward, .task-action {
                width: 100%;
            }
        }
    </style>
</head>
<body class="points-center">
    <header class="resources-header">
        <div class="container">
            <div class="logo">
                <a href="index.html">
                    <i class="fas fa-landmark"></i>
                    <span>留情局</span>
                </a>
            </div>
            <nav class="nav">
                <a href="resources.html" class="nav-link">资源共享</a>
                <a href="intelligence.html" class="nav-link">留学情报</a>
                <a href="forum.html" class="nav-link">留子论坛</a>
            </nav>
            <div class="header-actions">
                <div id="auth-container"></div>
            </div>
        </div>
    </header>

    <div class="points-header">
        <div class="container">
            <h1 style="font-size: 32px; margin-bottom: 10px;">🎯 积分中心</h1>
            <p style="font-size: 16px; opacity: 0.9;">完成任务赚取积分，解锁更多优质资源</p>
        </div>
    </div>

    <div class="container">
        <div class="points-balance-card">
            <div class="balance-item">
                <div class="balance-icon tokens">
                    <i class="fas fa-coins"></i>
                </div>
                <div class="balance-value" id="current-tokens">0</div>
                <div class="balance-label">当前积分</div>
            </div>
            <div class="balance-item">
                <div class="balance-icon contribution">
                    <i class="fas fa-chart-line"></i>
                </div>
                <div class="balance-value" id="contribution-value">0</div>
                <div class="balance-label">贡献值</div>
                <div class="balance-progress">
                    <div class="balance-progress-fill" id="level-progress" style="width: 0%"></div>
                </div>
                <div class="balance-hint" id="level-hint">距离下一等级还需 0 积分</div>
            </div>
            <div class="balance-item">
                <div class="balance-icon level">
                    <i class="fas fa-crown"></i>
                </div>
                <div class="balance-value" id="current-level">Lv.1</div>
                <div class="balance-label" id="level-title">新手</div>
            </div>
        </div>

        <div class="points-content">
            <div class="section-title">
                <i class="fas fa-tasks"></i>
                积分任务
            </div>

            <div class="tasks-section">
                <div class="task-tabs">
                    <button class="task-tab active" data-tab="daily">
                        <i class="fas fa-sun"></i> 每日任务
                    </button>
                    <button class="task-tab" data-tab="weekly">
                        <i class="fas fa-calendar-week"></i> 每周任务
                    </button>
                    <button class="task-tab" data-tab="achievement">
                        <i class="fas fa-trophy"></i> 成就任务
                    </button>
                </div>

                <div class="task-list" id="task-list">
                </div>
            </div>

            <div class="grid-2">
                <div>
                    <div class="section-title">
                        <i class="fas fa-trophy"></i>
                        积分排行榜
                    </div>

                    <div class="ranking-section">
                        <div class="ranking-tabs">
                            <button class="ranking-tab active" data-period="all">总榜</button>
                            <button class="ranking-tab" data-period="monthly">本月</button>
                            <button class="ranking-tab" data-period="weekly">本周</button>
                        </div>

                        <div class="ranking-list" id="ranking-list">
                        </div>
                    </div>
                </div>

                <div>
                    <div class="section-title">
                        <i class="fas fa-history"></i>
                        积分记录
                    </div>

                    <div class="history-section">
                        <div class="history-list" id="history-list">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
    <script src="js/auth-modal.js"></script>
    <script src="js/user-menu.js"></script>
    <script src="js/points-service.js"></script>
    <script src="js/points-center.js"></script>
    <script>
        let authModal, userMenu;
        let pointsCenter;

        document.addEventListener('DOMContentLoaded', function() {
            authModal = new AuthModal();
            userMenu = new UserMenu('auth-container');
            
            pointsCenter = new PointsCenter();

            updateBalanceDisplay();

            window.addEventListener('pointsChanged', function() {
                updateBalanceDisplay();
                pointsCenter.refreshTasks();
                pointsCenter.refreshHistory();
            });

            window.addEventListener('dailyLoginBonus', function(e) {
                updateBalanceDisplay();
                alert(`🎉 每日登录奖励 +${e.detail.amount} 积分！`);
            });

            document.querySelectorAll('.task-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.task-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    pointsCenter.renderTasks(this.dataset.tab);
                });
            });

            document.querySelectorAll('.ranking-tab').forEach(tab => {
                tab.addEventListener('click', function() {
                    document.querySelectorAll('.ranking-tab').forEach(t => t.classList.remove('active'));
                    this.classList.add('active');
                    pointsCenter.refreshRanking(this.dataset.period);
                });
            });
        });

        function updateBalanceDisplay() {
            const currentUser = AuthService.getCurrentUser();
            if (!currentUser) {
                document.getElementById('current-tokens').textContent = '0';
                document.getElementById('contribution-value').textContent = '0';
                document.getElementById('current-level').textContent = 'Lv.0';
                document.getElementById('level-title').textContent = '未登录';
                return;
            }

            const tokens = PointsService.getBalance(currentUser.id);
            const contribution = PointsService.getContributionValue(currentUser.id);
            const level = PointsService.getLevel(currentUser.id);

            document.getElementById('current-tokens').textContent = tokens;
            document.getElementById('contribution-value').textContent = contribution;
            document.getElementById('current-level').textContent = `Lv.${level.level}`;
            document.getElementById('level-title').textContent = level.title;

            if (level.maxPoints !== Infinity) {
                const progress = ((contribution - level.minPoints) / (level.maxPoints - level.minPoints)) * 100;
                document.getElementById('level-progress').style.width = `${Math.min(progress, 100)}%`;
                const nextLevel = PointsService.getLevelConfig().find(l => l.level === level.level + 1);
                if (nextLevel) {
                    document.getElementById('level-hint').textContent = `距离 ${nextLevel.title} 还需 ${nextLevel.minPoints - contribution} 积分`;
                }
            } else {
                document.getElementById('level-progress').style.width = '100%';
                document.getElementById('level-hint').textContent = '已达最高等级';
            }
        }
    </script>
</body>
</html>
