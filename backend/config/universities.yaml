        degree: "all"

# 监控配置
monitor:
  # 请求间隔（秒）
  request_delay: 5
  
  # 超时时间（秒）
  timeout: 30
  
  # 最大重试次数
  max_retries: 3
  
  # 内容长度限制（字符）
  max_content_length: 8000
  
  # 置信度阈值（低于此值的信息将被过滤）
  confidence_threshold: 0.7
