universities:
  # 美国顶尖大学
  - name: "MIT"
    country: "USA"
    pages:
      - url: "https://meche.mit.edu/education/graduate/admissions"
        type: "admission"
        degree: "master"
      - url: "https://www.eecs.mit.edu/academics/graduate/admissions/"
        type: "admission"
        degree: "master"

  - name: "Stanford"
    country: "USA"
    pages:
      - url: "https://gradadmissions.stanford.edu/programs"
        type: "admission"
        degree: "all"

  - name: "Harvard"
    country: "USA"
    pages:
      - url: "https://www.gsas.harvard.edu/admissions"
        type: "admission"
        degree: "all"

  # 英国顶尖大学
  - name: "Cambridge"
    country: "UK"
    pages:
      - url: "https://www.graduate.study.cam.ac.uk/"
        type: "admission"
        degree: "all"

  - name: "Oxford"
    country: "UK"
    pages:
      - url: "https://www.ox.ac.uk/admissions/graduate"
        type: "admission"
        degree: "all"

  # 欧洲顶尖大学
  - name: "ETH Zurich"
    country: "Switzerland"
    pages:
      - url: "https://ethz.ch/en/studies/master/application.html"
